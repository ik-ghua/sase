# PoC-1 Phase 2:真实共享 Envoy(L4 tcp_proxy)。
# 三个 listener / cluster:
#  :10001 -> cluster_a  (上游 100.64.0.10:8080, SO_MARK=1)  期望命中 t-a
#  :10002 -> cluster_b  (上游 100.64.0.10:8080, SO_MARK=2)  期望命中 t-b
#  :10003 -> cluster_misroute (上游 169.254.20.2:9090=t-b接口, SO_MARK=1)  错配:mark=A 却指向 B
#           验:per-tenant 表 + unreachable default 是否拦住(即便 L7 配错也不越租户)
static_resources:
  listeners:
  - name: l_a
    address: {socket_address: {address: 0.0.0.0, port_value: 10001}}
    filter_chains:
    - filters:
      - name: envoy.filters.network.tcp_proxy
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
          stat_prefix: a
          cluster: cluster_a
  - name: l_b
    address: {socket_address: {address: 0.0.0.0, port_value: 10002}}
    filter_chains:
    - filters:
      - name: envoy.filters.network.tcp_proxy
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
          stat_prefix: b
          cluster: cluster_b
  - name: l_x
    address: {socket_address: {address: 0.0.0.0, port_value: 10003}}
    filter_chains:
    - filters:
      - name: envoy.filters.network.tcp_proxy
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
          stat_prefix: x
          cluster: cluster_misroute
  clusters:
  - name: cluster_a
    connect_timeout: 2s
    type: STATIC
    load_assignment:
      cluster_name: cluster_a
      endpoints:
      - lb_endpoints:
        - endpoint: {address: {socket_address: {address: 100.64.0.10, port_value: 8080}}}
    upstream_bind_config:
      source_address: {address: 0.0.0.0, port_value: 0}
      socket_options:
      - {level: 1, name: 36, int_value: 1, state: STATE_PREBIND}   # SOL_SOCKET, SO_MARK=1
  - name: cluster_b
    connect_timeout: 2s
    type: STATIC
    load_assignment:
      cluster_name: cluster_b
      endpoints:
      - lb_endpoints:
        - endpoint: {address: {socket_address: {address: 100.64.0.10, port_value: 8080}}}
    upstream_bind_config:
      source_address: {address: 0.0.0.0, port_value: 0}
      socket_options:
      - {level: 1, name: 36, int_value: 2, state: STATE_PREBIND}   # SO_MARK=2
  - name: cluster_misroute
    connect_timeout: 2s
    type: STATIC
    load_assignment:
      cluster_name: cluster_misroute
      endpoints:
      - lb_endpoints:
        - endpoint: {address: {socket_address: {address: 169.254.20.2, port_value: 9090}}}  # t-b 接口!
    upstream_bind_config:
      source_address: {address: 0.0.0.0, port_value: 0}
      socket_options:
      - {level: 1, name: 36, int_value: 1, state: STATE_PREBIND}   # mark=A,却指向 B
admin:
  address: {socket_address: {address: 127.0.0.1, port_value: 9901}}
