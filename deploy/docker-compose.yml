# SASE 最小可演示栈(MVP 阶段1:从"测试里能跑"到"真实环境能演示")。
#
# 起的服务:
#   postgres   —— PG16(>=15 必需,migration 0020 NULLS NOT DISTINCT);建库 sase。
#   devpki     —— init 容器:生成 dev mTLS 证书(ca/server/client/pop/device)到共享 volume `certs`。
#   migrate    —— init 容器:按序应用 migrations/0001..0024(以 superuser,含建 app_rw/app_ro/app_platform_*
#                 角色 + 0013 视图 owner 绕 RLS)+ seed demo 租户/用户。
#   api-server —— 控制面/管理面:管理 HTTPS :8443(/healthz、/api/v1/*、/trust/pubkey)、
#                 控制+遥测 gRPC :8082、设备 ZTP 续期 mTLS :8444、/metrics :9100 + :9101。
#                 SASE_BOOTSTRAP_PLATFORM_ADMIN 启动签发 platform_admin 令牌打印到日志。
#   xds-server —— 控制面单元②:配置分发 ADS/Delta over mTLS gRPC :9090、/metrics :9102。
#   pop-agent  —— PoP 数据面边缘:订阅 xds-server 拿策略/撤销/SWG/FW/DLP/站点;接入面 :8081、
#                 连接器口 :7000;经 TRUST_URL 取 api-server 的签发公钥;TELEMETRY_ADDR 上报 DLP 命中。
#
# 端口/env 均从 cmd/*/main.go 实读(见 deploy/README.md 的对账表)。
# 角色/密码与本机测试基建一致(app_rw_dev 等),可经 deploy/.env 覆盖。
#
# ⚠️ 全部 dev 用途:自签 mTLS、DevProvider KEK、bootstrap 令牌进日志。生产严禁。

name: sase-demo

services:
  # ---- Postgres(数据库) ----
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${PG_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${PG_SUPERPASS:-postgres}
      POSTGRES_DB: ${PG_DB:-sase}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_SUPERUSER:-postgres} -d ${PG_DB:-sase}"]
      interval: 3s
      timeout: 3s
      retries: 20
    # 不对宿主暴露 5432(避免与本机 sase-pg-local:5433 / 其它 PG 冲突);需调试可临时加 ports。

  # ---- devpki:生成 dev mTLS 证书到共享 volume(init 容器,跑完即退) ----
  devpki:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        CMD: devpki
    environment:
      OUT: /certs
    volumes:
      - certs:/certs
      - ./devpki-entrypoint.sh:/devpki-entrypoint.sh:ro
    # **幂等**入口:卷已有完整证书集则跳过生成(否则 partial `up` 重跑本 init 容器会重生成 CA、
    # 破坏在运行服务的 mTLS 一致性)。要重生成请 `down -v` 清卷。
    entrypoint: ["/bin/sh", "/devpki-entrypoint.sh"]
    # init 容器需写新建的 certs volume(root 拥有);长期服务(api/xds/pop)只读挂载、仍非 root。
    user: "0:0"
    # devpki 进程跑完写完证书即退出(exit 0)。
    restart: "no"

  # ---- migrate:按序应用迁移 + seed(init 容器,跑完即退) ----
  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${PG_SUPERUSER:-postgres}
      PGPASSWORD: ${PG_SUPERPASS:-postgres}
      PGDATABASE: ${PG_DB:-sase}
      MIGRATIONS_DIR: /migrations
      SEED_FILE: /seed/seed.sql
    volumes:
      - ../migrations:/migrations:ro
      - ../scripts/migrate.sh:/migrate.sh:ro
      - ../scripts/seed.sql:/seed/seed.sql:ro
    entrypoint: ["/bin/sh", "/migrate.sh"]
    restart: "no"

  # ---- issue-session:Slice77 demo——签一枚会话凭证(SESSION_TOKEN)写共享卷,供 Agent 携带 ----
  # 用与 api-server 同一签发种子(CRED_ED25519_SEED)→ PoP 用 api-server 下发公钥(TrustBundle)可验签。
  # ⚠️ 仅 demo:固定种子 + 命令行注入 claim;生产经 IdP 登录→令牌交换签发(L1 3.4)。
  issue-session:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        CMD: issue-session
    depends_on:
      devpki:
        condition: service_completed_successfully
    environment:
      SASE_CRED_ED25519_SEED: ${CRED_ED25519_SEED:-c2FzZS1kZW1vLWVkMjU1MTktc2VlZC0zMmJ5dGVBQiE}
      TENANT: ${DEMO_TENANT_ID:-11111111-1111-1111-1111-111111111111}
      SUBJECT: ${ZTNA_SUBJECT:-alice@demo.local}
      # group=eng 命中 seed 的 allow 规则(eng → internal-app);改 GROUPS 可演示 deny。
      GROUPS: ${ZTNA_GROUPS:-eng}
      JTI: ${ZTNA_SESSION_JTI:-demo-agent-session-1}
      TTL: ${ZTNA_SESSION_TTL:-12h}
      OUT: /certs/session.token
      JTI_OUT: /certs/session.jti
    volumes:
      - certs:/certs
    # 写共享卷(root)。跑完即退。
    user: "0:0"
    restart: "no"

  # ---- internal-app:私网内部应用(echo-app,固定 IP;Slice77 ZTNA 到达目标) ----
  internal-app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        CMD: echo-app
    environment:
      ADDR: ":9000"
      NAME: internal-app
    networks:
      default:
        ipv4_address: 10.123.0.50   # 固定 IP:Agent 的 INTERNAL_CIDR/appResolver 据此映射

  # ---- api-server:控制面/管理面 ----
  api-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        CMD: api-server
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      devpki:
        condition: service_completed_successfully
    environment:
      # 四 DSN(角色密码与迁移内 CREATE ROLE 一致;经 .env 可覆盖)
      SASE_DB_RW_DSN: postgres://app_rw:${APP_RW_PASS:-app_rw_dev}@postgres:5432/${PG_DB:-sase}?sslmode=disable
      SASE_DB_RO_DSN: postgres://app_ro:${APP_RO_PASS:-app_ro_dev}@postgres:5432/${PG_DB:-sase}?sslmode=disable
      SASE_DB_PLATFORM_DSN: postgres://app_platform_ro:${APP_PLATFORM_RO_PASS:-app_platform_ro_dev}@postgres:5432/${PG_DB:-sase}?sslmode=disable
      SASE_DB_PLATFORM_RW_DSN: postgres://app_platform_rw:${APP_PLATFORM_RW_PASS:-app_platform_rw_dev}@postgres:5432/${PG_DB:-sase}?sslmode=disable
      SASE_TLS_DIR: /certs
      # 引导首枚 platform_admin:启动签发短期(15min)令牌打印日志(docker compose logs api-server 取用)
      SASE_BOOTSTRAP_PLATFORM_ADMIN: ${BOOTSTRAP_PLATFORM_ADMIN:-ops@demo.local}
      # 凭证签发种子(固定 → 重启稳定,pop-agent 取的 TrustBundle 公钥不变;base64url RawURLEncoding 解码须恰 32B)
      SASE_CRED_ED25519_SEED: ${CRED_ED25519_SEED:-c2FzZS1kZW1vLWVkMjU1MTktc2VlZC0zMmJ5dGVBQiE}
      # secret 模块 dev KEK(base64 StdEncoding 解码须恰 32B;固定 → 重启后 idp_config 等密文仍可解)
      SASE_DEV_KEK: ${DEV_KEK:-c2FzZS1kZW1vLWRldi1rZWstMzJieXRlcy1BQkNERSE=}
      # CSRF 允许的浏览器源(前端 dev/容器同源访问;逗号分隔)
      SASE_CSRF_ALLOWED_ORIGINS: ${CSRF_ALLOWED_ORIGINS:-http://localhost:5173,https://localhost:8443}
      # 监听地址(默认值即可,显式写出便于对照)
      ADMIN_ADDR: ":8443"
      AGENTCTL_ADDR: ":8082"
      DEVICE_ADDR: ":8444"
      SASE_API_METRICS_ADDR: ":9100"
      SASE_DEVICE_METRICS_ADDR: ":9101"
    ports:
      - "${ADMIN_PORT:-8443}:8443"   # 管理 HTTPS(控制台/curl)
      - "${DEVICE_PORT:-8444}:8444"  # 设备 ZTP 续期 mTLS
      - "${AGENTCTL_PORT:-8082}:8082" # 控制 + 遥测 gRPC
    volumes:
      - certs:/certs:ro
    healthcheck:
      # /healthz 是 HTTPS(整个 admin mux 在 TLS 后);自签证书 → --no-check-certificate
      test: ["CMD-SHELL", "wget -q --no-check-certificate -O /dev/null https://127.0.0.1:8443/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  # ---- xds-server:配置分发(ADS/Delta over mTLS) ----
  xds-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        CMD: xds-server
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      devpki:
        condition: service_completed_successfully
    environment:
      SASE_DB_RW_DSN: postgres://app_rw:${APP_RW_PASS:-app_rw_dev}@postgres:5432/${PG_DB:-sase}?sslmode=disable
      SASE_DB_RO_DSN: postgres://app_ro:${APP_RO_PASS:-app_ro_dev}@postgres:5432/${PG_DB:-sase}?sslmode=disable
      SASE_TLS_DIR: /certs
      XDS_ADDR: ":9090"
      METRICS_ADDR: ":9102"
      # dev 默认宽松;生产置 1(role-less/无证书订阅被拒)
      SASE_XDS_REQUIRE_CERT_SCOPE: ${XDS_REQUIRE_CERT_SCOPE:-0}
    volumes:
      - certs:/certs:ro

  # ---- pop-agent:PoP 数据面边缘 ----
  pop-agent:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        CMD: pop-agent
    depends_on:
      api-server:
        condition: service_healthy
      xds-server:
        condition: service_started
    # Slice77:ZTNA 终结器开 PoP-TUN(allow 内层包写入 → 内核 SNAT 出站)。需 NET_ADMIN + /dev/net/tun
    # + entrypoint 配路由/MASQUERADE。ip_forward 经 sysctls(/proc/sys 在容器内只读,运行期写会失败,
    # 由 Docker 在启动时应用本 sysctl;命名空间化、不影响宿主)。
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      net.ipv4.ip_forward: "1"
    entrypoint: ["/bin/sh", "/pop-entrypoint.sh"]
    environment:
      XDS_ADDR: xds-server:9090
      TRUST_URL: https://api-server:8443
      TELEMETRY_ADDR: api-server:8082
      SASE_TLS_DIR: /certs
      # 必填:demo 租户 UUID(与 scripts/seed.sql 固定 UUID 一致 → pop-agent 订阅该租户)
      TENANT: ${DEMO_TENANT_ID:-11111111-1111-1111-1111-111111111111}
      NODE: ${POP_NODE:-pop-demo}
      INGRESS_ADDR: ":8081"
      CONNECTOR_ADDR: ":7000"
      METRICS_ADDR: ":9101"
      # dev 默认关(容忍共享证书);生产置 1(W9 fail-closed:仅 ZTP 租户绑定证书)
      SASE_REQUIRE_CERT_TENANT: ${REQUIRE_CERT_TENANT:-0}
      # ---- SD-WAN 数据面隧道(T1:让两个分支站点经真 dptunnel 隧道过 PoP 互通) ----
      # 握手 TCP(mutual TLS,校验 CPE ZTP 证书取 tenant/site)+ 数据 UDP(dptunnel 帧)。
      SDWAN_TUNNEL_ADDR: ":7200"
      SDWAN_DATA_ADDR: ":7100"
      # 通告给 CPE 的 PoP 数据面地址:容器网络内 CPE 须经服务名 pop-agent 可达(非监听用的 :7100/0.0.0.0)。
      SDWAN_DATA_ADV: "pop-agent:7100"
      # 算法档(dev 非国密;生产经控制面下发租户档)。
      SDWAN_TUNNEL_ALG: ${SDWAN_TUNNEL_ALG:-chacha20poly1305}
      # ---- Slice77 ZTNA-over-packet 终结(真 OS Agent → PoP 终结 → PEP → 内部 app) ----
      ZTNA_TUNNEL_ADDR: ":7400"           # 握手 TCP(mutual TLS + 会话凭证验证)
      ZTNA_DATA_ADDR: ":7300"             # 数据 UDP(Agent dptunnel 帧)
      ZTNA_DATA_ADV: "pop-agent:7300"     # 通告给 Agent 的 PoP 数据面地址(服务名:端口)
      ZTNA_TUNNEL_ALG: ${SDWAN_TUNNEL_ALG:-chacha20poly1305}
      ZTNA_TUN: saze0                     # PoP-TUN 名(pop-entrypoint 据此配 IP/路由)
      # appResolver:目的(tenant=cidr=appKey)→ PEP resource。internal-app(10.123.0.50)→ "internal-app"(allow);
      # secret(10.123.0.60)→ "secret-app"(seed bundle 无规则 → default-deny,演示 deny 路径)。
      ZTNA_APP_RESOLVE: "${DEMO_TENANT_ID:-11111111-1111-1111-1111-111111111111}=10.123.0.50/32=internal-app;${DEMO_TENANT_ID:-11111111-1111-1111-1111-111111111111}=10.123.0.60/32=secret-app"
      # pop-entrypoint 配 PoP-TUN IP(回程网段)+ SNAT(出口 eth0,源 = Agent 内层网段)。
      ZTNA_POP_TUN_ADDR: "10.88.0.1/24"
      ZTNA_EGRESS_IF: eth0
    ports:
      - "${INGRESS_PORT:-8081}:8081" # ZTNA 接入面(mTLS),供 agent 演示
    volumes:
      - certs:/certs:ro
      - ./pop-entrypoint.sh:/pop-entrypoint.sh:ro

  # ---- cpe-site-a:SD-WAN 分支站点 A(北京,10.10.0.0/24) ----
  # 经 ZTP 取租户绑定证书(tenant=Org/site=CN=site-a)→ 与 pop-agent 握手 → dptunnel 真隧道(TUN+UDP)。
  # 需 NET_ADMIN + /dev/net/tun(Docker Desktop 容器是 Linux,可建 TUN)。
  cpe-site-a:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        CMD: cpe
    depends_on:
      api-server:
        condition: service_healthy   # ZTP /enroll 在管理面 HTTPS
      pop-agent:
        condition: service_started
    cap_add:
      - NET_ADMIN                     # 建 TUN + 配 IP/路由
    devices:
      - /dev/net/tun:/dev/net/tun     # TUN 字符设备
    environment:
      TENANT: ${DEMO_TENANT_ID:-11111111-1111-1111-1111-111111111111}
      SITE: site-a
      # ZTP:激活码须与 scripts/seed.sql 的 site-a 入网记录一致(<tenant>.<hex>)。
      ZTP_CODE: ${SITE_A_ZTP_CODE:-11111111-1111-1111-1111-111111111111.aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa}
      # ServerName 固定 localhost(server 证书 SAN 含 localhost),故 host 用服务名 api-server 不影响验证。
      MGMT_URL: https://api-server:8443
      DEVICE_URL: https://api-server:8444
      XDS_ADDR: xds-server:9090
      SASE_TLS_DIR: /certs
      # SD-WAN 真隧道模式
      SDWAN_TUNNEL: "1"
      SDWAN_TUNNEL_ADDR: pop-agent:7200   # PoP 握手 TCP
      SDWAN_DATA_ADDR: ":7101"            # 本端数据面 UDP(固定端口,使通告地址与实际源地址一致)
      SDWAN_DATA_ADV: cpe-site-a:7101     # 通告给 PoP 的回程/解复用地址(服务名→容器 IP,与源地址一致)
      SDWAN_TUNNEL_ALG: ${SDWAN_TUNNEL_ALG:-chacha20poly1305}
      # runTunnel 不需 UPSTREAM_URL/POP_CONNECTOR_ADDR(那是 revtunnel L7 路径),但 cmd 仍 envMust 校验
      # 这些,故给占位值(SD-WAN 隧道模式下不实际拨号 revtunnel)。
      POP_CONNECTOR_ADDR: pop-agent:7000
      UPSTREAM_URL: http://127.0.0.1:9
      # TUN 配置(由 cpe-entrypoint.sh 在 TUN 出现后配):本站网关 IP + 对端站点 CIDR 经 TUN。
      SDWAN_TUN: sase0
      CPE_TUN_ADDR: 10.10.0.1/24
      CPE_PEER_CIDR: 10.20.0.0/24
    entrypoint: ["/bin/sh", "/cpe-entrypoint.sh"]
    volumes:
      - certs:/certs:ro
      - ./cpe-entrypoint.sh:/cpe-entrypoint.sh:ro

  # ---- cpe-site-b:SD-WAN 分支站点 B(上海,10.20.0.0/24) ----
  cpe-site-b:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        CMD: cpe
    depends_on:
      api-server:
        condition: service_healthy
      pop-agent:
        condition: service_started
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      TENANT: ${DEMO_TENANT_ID:-11111111-1111-1111-1111-111111111111}
      SITE: site-b
      ZTP_CODE: ${SITE_B_ZTP_CODE:-11111111-1111-1111-1111-111111111111.bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb}
      MGMT_URL: https://api-server:8443
      DEVICE_URL: https://api-server:8444
      XDS_ADDR: xds-server:9090
      SASE_TLS_DIR: /certs
      SDWAN_TUNNEL: "1"
      SDWAN_TUNNEL_ADDR: pop-agent:7200
      SDWAN_DATA_ADDR: ":7101"
      SDWAN_DATA_ADV: cpe-site-b:7101
      SDWAN_TUNNEL_ALG: ${SDWAN_TUNNEL_ALG:-chacha20poly1305}
      POP_CONNECTOR_ADDR: pop-agent:7000
      UPSTREAM_URL: http://127.0.0.1:9
      SDWAN_TUN: sase0
      CPE_TUN_ADDR: 10.20.0.1/24
      CPE_PEER_CIDR: 10.10.0.0/24
    entrypoint: ["/bin/sh", "/cpe-entrypoint.sh"]
    volumes:
      - certs:/certs:ro
      - ./cpe-entrypoint.sh:/cpe-entrypoint.sh:ro

  # ---- agent:真 OS ZTNA 端点 Agent(Slice77 端到端:Agent → PoP 终结 → PEP → 内部 app) ----
  # 经 ZTP 取租户绑定证书(tenant=Org / CN=demo-agent)→ 与 pop-agent 的 ZTNA_TUNNEL_ADDR 握手(携
  # SESSION_TOKEN,PoP 验签 + 交叉核对租户)→ dptunnel 隧道 → TUN 抓 INTERNAL_CIDR 的包送进隧道。
  # 演示:进容器 `curl http://10.123.0.50:9000/hi` → 经隧道 → PoP PEP allow → 到 internal-app。
  agent:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        CMD: agent
    depends_on:
      api-server:
        condition: service_healthy   # ZTP /enroll 在管理面 HTTPS
      pop-agent:
        condition: service_started
      issue-session:
        condition: service_completed_successfully  # 等 SESSION_TOKEN 写入共享卷
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    entrypoint: ["/bin/sh", "/agent-entrypoint.sh"]
    environment:
      TENANT: ${DEMO_TENANT_ID:-11111111-1111-1111-1111-111111111111}
      IDENTITY: demo-agent                # 证书 CN(与 seed 的 agent 入网 identity 一致)
      ZTP_CODE: ${AGENT_ZTP_CODE:-11111111-1111-1111-1111-111111111111.cccccccccccccccccccccccccccccccc}
      MGMT_URL: https://api-server:8443
      DEVICE_URL: https://api-server:8444
      SASE_TLS_DIR: /certs
      # PoP 候选:ZTNA 握手地址(pop-agent 的 ZTNA_TUNNEL_ADDR=:7400)。
      POP_CANDIDATES: "pop=pop-agent:7400"
      SDWAN_TUNNEL_ALG: ${SDWAN_TUNNEL_ALG:-chacha20poly1305}
      # 本端数据面 UDP:固定端口,使通告地址 == 实际源地址(PoP bySrc 解复用命中)。
      SDWAN_DATA_ADDR: ":7301"
      SDWAN_DATA_ADV: agent:7301
      # split-tunnel:接管去 internal-app(10.123.0.50)的流量进隧道(secret 10.123.0.60 演示 deny)。
      INTERNAL_CIDR: "10.123.0.50/32,10.123.0.60/32"
      # TUN 名(agent-entrypoint 据此配内层 IP)。
      AGENT_TUN: saze0
      AGENT_TUN_ADDR: 10.88.0.2/24        # 内层源 IP(其网段须与 PoP 的 ZTNA_POP_TUN_ADDR 一致 → 回程可达)
      # 会话凭证:由 issue-session 写入共享卷;agent-entrypoint 读文件 → 导出 SESSION_TOKEN。
      SESSION_TOKEN_FILE: /certs/session.token
      SESSION_JTI_FILE: /certs/session.jti
    volumes:
      - certs:/certs:ro
      - ./agent-entrypoint.sh:/agent-entrypoint.sh:ro

volumes:
  pgdata:
  certs:

# 固定子网(默认网络):使 internal-app 能取静态 IP(10.123.0.50),Agent 据此设 INTERNAL_CIDR、
# appResolver 据此映射 resource;PoP 出站 SNAT 后内核可在本网段内直达 internal-app(Slice77 §3.4 b)。
networks:
  default:
    ipam:
      config:
        - subnet: 10.123.0.0/16
          gateway: 10.123.0.1
